name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Check JSON is well-formed
        run: npm run check:json
      - name: Build the package
        run: npm run build
      - name: Run tests
        run: node --test
      - name: Validate examples with the shipped validator
        run: npm run validate:examples
